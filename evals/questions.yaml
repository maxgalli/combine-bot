# Evaluation question set for combine-bot.
#
# Each entry needs:
#   id          unique identifier (free-form)
#   question    the natural-language question the bot will answer
#   gold_answer the reference answer used by the RAGAS judge LLM
#               (for both retrieval and generation metrics)
#
# Optional:
#   category    tag for grouping (usage / forum-solved / paper / code / ...)
#   notes       free-form notes for the human curator
#   images      list of image paths to attach when asking the bot
#               (read by eval_answers.py and ask.py --image; ignored by
#               eval_retrieval.py because retrieval is text-only)
#
# Add more questions over time. Aim for diversity across source types:
#   - usage / debugging   (docs + forum)
#   - theoretical         (paper)
#   - implementation      (code)
#   - solved-forum cases  (extract from knowledge_base/forum/topic_*.json)
- id: debug-fastscan-1
  category: usage
  source_file: docs/part3/debugging.md
  question: How can I use combineTool.py to analyze the shape of the NLL as a function of each parameter, in order to investigate fit problems?
  gold_answer: |
    The `FastScan` mode of `combineTool.py` evaluates the NLL as a function of
    each parameter individually, keeping the other parameters fixed at their
    workspace default values. The output file contains the NLL together with
    its first and second derivatives for each parameter. Discontinuities in
    those derivatives — particularly near a parameter's minimum — are a
    common source of fit problems and are what `FastScan` is meant to expose.

    Basic usage, which uses the data in the workspace to evaluate the NLL:

        combineTool.py -M FastScan -w workspace.root:w

    To run on an Asimov dataset with `r=1` injected instead, first generate
    the toy with `-M GenerateOnly`, then point `FastScan` at it:

        combine -M GenerateOnly workspace.root -t -1 --saveToys --setParameters r=1
        combineTool.py -M FastScan -w workspace.root:w \
            -d higgsCombineTest.GenerateOnly.mH120.123456.root:toys/toy_asimov

    The first command produces `higgsCombineTest.GenerateOnly.mH120.123456.root`;
    if you change the mass (`-m`) or the output name prefix (`-n`) on that call,
    adjust the toy filename in the second command accordingly.

    The debugging section also links to a 2020 Combine tutorial deck with
    further pointers, but `FastScan` is the only technique covered directly
    on this page.

- id: freeze-snapshot-1
  category: usage
  source_file: docs/part5/longexercise.md
  images:
    - knowledge_base/combine/docs/part5/images/freeze_first_attempt.png
  question: |
    I ran a MultiDimFit scan in r, then re-ran the scan with
    `--freezeParameters allConstrainedNuisances` to overlay a stat-only
    curve, but as you can see in the attached plot the two curves do not
    sit on top of each other at the minimum. How can I make them overlay
    correctly?
  gold_answer: |
    The two curves don't overlay because `--freezeParameters` acts
    *before* the initial fit: the nuisance parameters get frozen at their
    workspace default values before the best-fit is found, so the
    stat-only fit ends up shifted. You only want the freeze to apply
    during the scan, not during the central fit.

    The fix is to run two steps and pass a snapshot of the best-fit
    parameter values between them:

    1. Do a single fit without freezing, adding `--saveWorkspace` so the
       output workspace stores a snapshot of the best-fit values:

           combine -M MultiDimFit workspace_part3.root \
               -n .part3E.snapshot -m 200 --rMin -1 --rMax 2 \
               --saveWorkspace

       The output file `higgsCombine.part3E.snapshot.MultiDimFit.mH200.root`
       now contains the workspace plus a snapshot named `MultiDimFit`.

    2. Run the frozen scan against that output file, restoring the
       snapshot with `--snapshotName MultiDimFit`:

           combine -M MultiDimFit higgsCombine.part3E.snapshot.MultiDimFit.mH200.root \
               -n .part3E.freezeAll -m 200 --rMin -1 --rMax 2 \
               --algo grid --points 30 \
               --freezeParameters allConstrainedNuisances \
               --snapshotName MultiDimFit

    Now the two curves share the same minimum and the stat-only curve
    sits inside the full one. You can also pass `--breakdown Syst,Stat`
    to `plot1DScan.py` to draw the systematic component, defined as
    `sigma_syst = sqrt(sigma_tot^2 - sigma_stat^2)`.

- id: forum-142937
  category: forum-solved
  topic_url: https://cms-talk.web.cern.ch/t/142937
  images:
    - knowledge_base/forum/images/topic_142937_page2.png
  question: |
    I am studying regularization after unfolding in our analysis. We observe
    sharp spikes in the δ scans of the mean global correlation coefficient.
    From our study these spikes appear linked to increased correlations
    between the POIs: individual nuisance parameters tend to reduce
    POI correlations, but introducing multiple ones simultaneously increases
    those correlations and seems to generate the spikes.
    What could be causing this behavior and what is the best way to get rid of these spikes?
  gold_answer: |
    The spikes in the mean global correlation coefficient scans are typically
    caused by limited numerical precision of the correlation/covariance matrix
    produced by the default Hesse step. The fix is to recompute the covariance
    matrix with a more robust algorithm and to combine it with a stricter
    minimizer strategy. In Combine this means passing both:

        --robustHesse 1
        --cminDefaultMinimizerStrategy 1

    Together these recompute the correlation matrix with higher precision
    and use a more careful Migrad strategy, which removes the spikes in
    practice.

- id: forum-144631
  category: forum-conceptual
  source_file: docs/part3/nonstandard.md
  topic_url: https://cms-talk.web.cern.ch/t/144631
  question: |
    In Combine's discrete profiling method (RooMultiPdf / envelope of
    background pdfs), how is the NLL of the background-only fit computed
    when there are multiple candidate background functional forms?
    Specifically: if the S+B fit minimum corresponds to background
    function `i`, is the same function `i` used to evaluate the NLL of
    the B-only fit (i.e. at r=0), so that NLL(S+B) − NLL(B) compares the
    same background model with and without signal? Or is the background
    function profiled independently at r=0?
  gold_answer: |
    The background functional form is profiled independently at each
    value of r. The envelope is rebuilt fresh at every point of the
    scan: at any given r, the NLL is minimised over all candidate
    background pdfs — with the penalty / correction terms that account
    for their differing numbers of degrees of freedom — and the minimum
    across the envelope is taken.

    This means the function that minimises the envelope at the S+B
    best-fit (say, function `i`) is in general different from the
    function that minimises at r = 0 (say, function `j`). The test
    statistic NLL(S+B) − NLL(B) therefore compares two independent
    envelope minima, not the same background function evaluated at two
    different values of r.

    This is by design. By allowing the choice of background function to
    vary along the r scan, the discrete profiling method effectively
    enlarges the ΔNLL profile and folds the choice of functional form
    into the test statistic as a systematic uncertainty. The penalty
    terms in the envelope ensure that comparisons across pdfs with
    different numbers of free parameters remain well-defined.

- id: paper-statmodel-1
  category: paper
  source_file:
    - paper/paper_clean.txt
    - docs/what_combine_does/model_and_likelihood.md
  question: |
    How is a statistical model built with the Combine tool structured?
    What are its main components — both parameters and observables — how
    are they categorized, and how do they combine into the full
    probability density?
  gold_answer: |
    The statistical model built by Combine is a joint probability density
    p(data; Φ) where Φ collects all model parameters. It factorizes along
    two axes for numerical efficiency:

    Parameters are split into:
      • Parameters of interest μ — signal strengths, cross sections, etc.
      • Nuisance parameters ν — modeling theoretical and experimental
        uncertainties.

    Observables are split into:
      • Primary observables x — appear in components containing the POIs.
        Each element of x is a "channel" and is statistically independent
        of the others.
      • Auxiliary observables y — appear only in components containing
        nuisance parameters. Each ν_k is paired with one y_k.

    The full model factorizes as

        p(x, y; Φ) = p(x; μ, ν) · Π_k p_k(y_k; ν_k),

    where p(x; μ, ν) is the primary distribution and each p_k(y_k; ν_k)
    encodes how well the corresponding nuisance is constrained. In
    Combine, the priors on all nuisance parameters are taken to be uniform.

- id: code-adaptive-hybridnew-1
  category: usage
  source_file:
    - docs/part3/commonstatsmethods.md
    - src/HybridNew.cc
  question: |
    What is adaptive sampling in Combine's HybridNew method, and how do
    I control or disable it from the command line?
  gold_answer: |
    By default, HybridNew uses adaptive sampling: toys are thrown in
    batches and the procedure stops as soon as the statistical
    uncertainty on CLs (or p_μ) reaches the requested accuracy, or once
    the current estimate is clearly far from the CL contour of interest.
    This avoids wasting computation on points whose answer is already
    statistically unambiguous.

    Two command-line options govern the behaviour:

      • `--toysH N` (or `-T N`): minimum number of toys thrown per batch
        (default 500). Increase this for higher CL levels (e.g. 99%).
      • `--clsAcc X`: target absolute accuracy on CLs (default 0.005).

    To disable adaptive sampling and throw a fixed number of toys, set
    `--clsAcc 0`. The algorithm then runs exactly `--iterations × T`
    toys without early termination. This is the standard pattern when
    building a grid of test-statistic distributions for complex models:

        combine datacard.txt -M HybridNew --LHCmode LHC-limits \
            --singlePoint X --saveToys --saveHybridResult \
            -T 500 --clsAcc 0

- id: forum-130063
  category: forum-conceptual
  topic_url: https://cms-talk.web.cern.ch/t/130063
  source_file:
    - docs/part2/settinguptheanalysis.md
  question: |
    We are performing a shape-only analysis (total MC entries set to
    match data entries). Is this already implemented in Combine, or is
    there an easy way to do it — so that, for example, when one
    background goes up the other MCs go down to compensate during the
    fit?
    We had considered either introducing a global normalisation
    parameter in the fit with a large uncertainty to fix the MC
    normalisation, or introducing the systematics with multiplicative
    factors in the datacards to maintain MC normalisation during the
    fit. What is the recommended approach?
  gold_answer: |
    The recommended approach is to do a template (shape) analysis and
    add a `rateParam` on the background and/or signal yields. A
    `rateParam` declares a freely-floating multiplicative parameter for
    a process's rate, so the yields adjust in the fit to match the
    data. Because the rate is now a proper fit parameter, the
    uncertainty on it is propagated automatically — there is no need
    to introduce a large-uncertainty nuisance by hand or to hand-craft
    multiplicative systematic factors.

    The datacard syntax is:

        <name> rateParam <channel> <process> <init> [<min>,<max>]

    For example, to let the rate of the `bkg` process float freely in
    channel `ch1`:

        bkg_norm rateParam ch1 bkg 1 [0,10]

    `rateParam` can be applied to any number of processes (signals,
    individual backgrounds, or shared across channels), which makes it
    the right tool for the "shapes carry the information, rates float"
    pattern the question describes.

- id: agent-setparam-range-1
  category: agent-debug
  notes: |
    Agent-mode question. Requires --attach with simple-shapes-TH1.txt
    and simple-shapes-TH1.root. The bot should run the user's command,
    read the error, and explain the fix. Not yet covered by
    eval_answers.py (needs agent eval path).
  attach:
    - evals/attachments/agent-setparam-range-1/simple-shapes-TH1.txt
    - evals/attachments/agent-setparam-range-1/simple-shapes-TH1.root
  question: |
    I am trying to run a MultiDimFit on the attached datacard with the
    following command:

        combine -M MultiDimFit simple-shapes-TH1.txt --setParameterRanges r=0.2,0.4 --setParameters r=10

    but the fit fails. Can you run it and tell me what is wrong?
  gold_answer: |
    The fit fails because the starting value of the parameter r (set via
    ``--setParameters r=10``) is outside the range declared by
    ``--setParameterRanges r=0.2,0.4``. Combine enforces that a
    parameter's value must lie within its range and aborts with:

        Parameter r value 10 is outside its range [0.2, 0.4].
        Use --rMin/--rMax or --setParameterRanges to adjust the range.

    The fix is to make the starting value and the range consistent.
    Either:
      1. Change ``--setParameters r=0.3`` (or any value inside
         [0.2, 0.4]).
      2. Or widen the range to include 10, e.g.
         ``--setParameterRanges r=0,20 --setParameters r=10``.
